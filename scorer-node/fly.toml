app = "sigma-max-api"
primary_region = "iad"   # US East — change to "lhr" for London, "sin" for Singapore

[build]
  dockerfile = "Dockerfile"

[env]
  PORT       = "8080"
  NODE_ENV   = "production"
  CORS_ORIGINS = "*"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false   # keep alive — no cold starts
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = "512mb"
  cpus   = 1
